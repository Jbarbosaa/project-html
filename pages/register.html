<html>
<head>
<meta charset="UTF-8">
<title>Cadastro</title>
</head>
<body style="background-image: url(../img/back.jpg); background-size: cover; background-position: center; margin: 0;">
<center style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px 0;">
<div style="background-color: white; padding: 30px; border-radius: 10px; box-shadow: 0px 0px 10px gray; text-align: center;">
<form method="GET">
<table style="margin: 0 auto;">
<tr><td colspan="2" style="text-align: center;"><h2>Register</h2></td></tr>
<tr><td style="padding: 10px;">Nome:</td><td style="padding: 10px;"><input type="text" name="nome" size="30" maxlength="30"></td></tr>
<tr><td style="padding: 10px;">Senha:</td><td style="padding: 10px;"><input type="password" name="senha" size="30" maxlength="30"></td></tr>
<tr><td style="padding: 10px;">Email:</td><td style="padding: 10px;"><input type="email" name="email" size="30" maxlength="30"></td></tr>
<tr><td style="padding: 10px;">Celular:</td><td style="padding: 10px;"><input type="tel" name="celular" size="30" maxlength="30"></td></tr>
<tr><td style="padding: 10px;">Data de Nascimento:</td><td style="padding: 10px;"><input type="date" name="nascimento"></td></tr>
<tr><td style="padding: 10px;">Endereço:</td><td style="padding: 10px;"><input type="text" name="endereco" size="30" maxlength="30"></td></tr>
<tr><td style="padding: 10px;">Cidade:</td><td style="padding: 10px;"><input type="text" name="cidade" size="30" maxlength="30"></td></tr>
<tr><td style="padding: 10px;">UF:</td><td style="padding: 10px;"><select name="uf">
    <option value="AC">AC</option>
    <option value="AL">AL</option>
    <option value="AP">AP</option>
    <option value="AM">AM</option>
    <option value="BA">BA</option>
    <option value="CE">CE</option>
    <option value="DF">DF</option>
    <option value="ES">ES</option>
    <option value="GO">GO</option>
    <option value="MA">MA</option>
    <option value="MT">MT</option>
    <option value="MS">MS</option>
    <option value="MG">MG</option>
    <option value="PA">PA</option>
    <option value="PB">PB</option>
    <option value="PR">PR</option>
    <option value="PE">PE</option>
    <option value="PI">PI</option>
    <option value="RJ">RJ</option>
    <option value="RN">RN</option>
    <option value="RS">RS</option>
    <option value="RO">RO</option>
    <option value="RR">RR</option>
    <option value="SC">SC</option>
    <option value="SP">SP</option>
    <option value="SE">SE</option>
    <option value="TO">TO</option>
  </select></td></tr>
<tr><td style="padding: 10px;">CEP:</td><td style="padding: 10px;"><input type="text" name="cep" size="30" maxlength="30"></td></tr>
<tr><td style="padding: 10px;">Complemento:</td><td style="padding: 10px;"><input type="text" name="complemento" size="30" maxlength="30"></td></tr>
<tr><td style="padding: 10px;">Usuário:</td><td style="padding: 10px;"><input type="text" name="usuario" size="30" maxlength="30"></td></tr>
<tr><td style="padding: 10px;">Departamento:</td><td style="padding: 10px;">
<select name="departamento">
    <option value="vendas">Vendas</option>
    <option value="marketing">Marketing</option>
    <option value="ti">TI</option>
    <option value="rh">RH</option>
</select>
</td></tr>
<tr><td style="padding: 10px;">Cargo:</td><td style="padding: 10px;"><select name="cargo">
    <option value="estagiario">Estagiário</option>
    <option value="analista">Analista</option>
    <option value="gerente">Gerente</option>
    <option value="diretor">Diretor</option>
    <option value="programador">Programador</option>
</select>
</td></tr>
<tr><td colspan="2" style="text-align: center; padding: 10px;">
<input type="submit" value="Enviar">
<input type="reset" value="Reset">
</td></tr>
</table>
</form>
</div>
</center>
</body>
</html>
