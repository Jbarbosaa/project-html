<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>

<style>
    body {
        font-family: Arial, Helvetica, sans-serif;
        background-image: url(../img/back.jpg);
        background-size: cover;
        background-position: center;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }

    .container {
        display: flex;
        gap: 20px;
        justify-content: center;
        align-items: flex-start;
        background-color: rgba(0, 0, 0, 0.45);
        padding: 30px;
        border-radius: 12px;
    }

    .card {
        background: white;
        padding: 20px;
        width: 200px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px gray;
        text-align: center;
    }

    .numero {
        font-size: 30px;
        font-weight: bold;
        color: blue;
    }

    h1, li {
        color: white;
    }
</style>

<body>
    <h1>Dashboard</h1>
    <div class="container">
        <div class="card">
            <h3>Usuario</h3>
            <p class="numero">Julio</p>
        </div>
        <ul>
            <li>Departamento
                <ul>
                    <li>TI</li>
                </ul>
            </li>
            <li>E-mail
                <ul>
                    <li>suporte@awarecompany.com</li>
                </ul>
            </li>
        </ul>
    </div>
</body>
</html>
